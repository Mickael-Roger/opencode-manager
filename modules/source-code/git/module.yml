name: git
version: 3
description: Clone a git repository into the workspace. The git identity (user.name / user.email) is imported from the host automatically when set.
# Multi-instance: one entry per repository. Each install writes ~/.gitconfig
# (identity resolved from the host) and clones the repo into the workspace home
# directory; nothing in ~/.env, so it never bounces the OpenCode server and can be
# edited while a task is running.
restartServer: false
key: repo
prompts:
  - name: repo
    label: Repository URL (ssh or https)
    type: string
    required: true
