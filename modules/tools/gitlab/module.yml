name: gitlab
version: 2
description: Install the GitLab CLI (glab) and optionally import this host's glab configuration so the workspace is signed in to the same GitLab instance(s).
# Writes only glab's own config (~/.config/glab-cli), which tools read live;
# nothing in ~/.env, so it never bounces the OpenCode server and can be edited mid-task.
restartServer: false
prompts:
  - name: import_config
    label: Import this host's glab configuration (sign in to the same GitLab instances)?
    type: bool
    default: "true"
