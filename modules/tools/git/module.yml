name: git
version: 2
description: Configure the git identity (user.name / user.email) and optionally clone repositories into the workspace.
# Writes ~/.gitconfig and clones any requested repos into the workspace home
# directory; nothing in ~/.env, so it never bounces the OpenCode server and can
# be edited while a task is running.
restartServer: false
prompts:
  - name: name
    label: Git user name
    type: string
    required: true
  - name: email
    label: Git email
    type: string
    required: true
  - name: repos
    label: Repositories to clone (ssh or https URLs, space- or comma-separated)
    type: string
