name: Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            node_arch: x64
          - goos: linux
            goarch: arm64
            node_arch: arm64
          - goos: darwin
            goarch: amd64
            node_arch: x64
          - goos: darwin
            goarch: arm64
            node_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history + tags so `git describe` can resolve the version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          # Version comes from the git tag: exactly "vX.Y.Z" on a tag build, or a
          # "vX.Y.Z-N-gSHA" describe string on branch/PR builds.
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          go build -trimpath \
            -ldflags "-s -w -X github.com/mickael-menu/opencode-manager/internal/tui.appVersion=${VERSION}" \
            -o dist/opencode-manager-${{ matrix.goos }}-${{ matrix.node_arch }} ./cmd/opencode-manager
          chmod 755 dist/opencode-manager-${{ matrix.goos }}-${{ matrix.node_arch }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-manager-${{ matrix.goos }}-${{ matrix.node_arch }}
          path: dist/opencode-manager-${{ matrix.goos }}-${{ matrix.node_arch }}
          if-no-files-found: error

  package:
    name: Package npm tarball
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare package binaries
        run: |
          mkdir -p dist
          cp artifacts/opencode-manager-linux-x64/opencode-manager-linux-x64 dist/
          cp artifacts/opencode-manager-linux-arm64/opencode-manager-linux-arm64 dist/
          cp artifacts/opencode-manager-darwin-x64/opencode-manager-darwin-x64 dist/
          cp artifacts/opencode-manager-darwin-arm64/opencode-manager-darwin-arm64 dist/
          chmod 755 dist/opencode-manager-*

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Verify tag is merged into main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "${GITHUB_SHA}" FETCH_HEAD; then
            echo "Tag commit ${GITHUB_SHA} is contained in main; proceeding to publish."
          else
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not merged into main; refusing to publish."
            exit 1
          fi

      - name: Pack npm package
        run: npm pack

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public
